<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Implanter OS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>Implanter OS</h1>
        <p class="subtitle">ניתוח פגישות והפיכתן לתוכנית עבודה ברורה</p>

        <form id="meeting-form" class="form-grid">
          <label>
            שם לקוח
            <input id="clientName" type="text" required />
          </label>

          <label>
            תאריך פגישה
            <input id="meetingDate" type="date" required />
          </label>

          <label>
            סוג פגישה
            <select id="meetingType" required>
              <option value="" disabled selected>בחרו סוג פגישה</option>
              <option value="הדרכה">הדרכה</option>
              <option value="תמיכה">תמיכה</option>
              <option value="אפיון">אפיון</option>
              <option value="המשך">המשך</option>
            </select>
          </label>

          <label class="full-width">
            תמליל פגישה
            <textarea id="transcript" rows="9" required placeholder="הדביקו כאן את תמליל הפגישה..."></textarea>
          </label>

          <button id="analyzeBtn" type="submit">נתח פגישה</button>
        </form>
      </section>

      <section id="results" class="panel hidden" aria-live="polite">
        <h2>תוצאות ניתוח</h2>
        <div class="cards" id="resultCards"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
