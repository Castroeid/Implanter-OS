<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Implanter OS Logo</title>
  <desc id="desc">Technology and human resources inspired logo for Implanter OS, a meeting analysis system for implementation work.</desc>
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0d2b4a"/>
      <stop offset="55%" stop-color="#06192d"/>
      <stop offset="100%" stop-color="#020b16"/>
    </radialGradient>
    <linearGradient id="blueGrad" x1="20%" y1="10%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#83e8ff"/>
      <stop offset="48%" stop-color="#19a9ff"/>
      <stop offset="100%" stop-color="#0867d7"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7db7f7"/>
      <stop offset="60%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0b3973"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.65  0 0 0 0 1  0 0 0 0.7 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00152d" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bgRadial)"/>

  <!-- subtle tech grid -->
  <g opacity="0.14" stroke="#2aa8ff" stroke-width="1">
    <path d="M120 160H1080M120 260H1080M120 360H1080M120 460H1080M120 560H1080M120 660H1080M120 760H1080"/>
    <path d="M180 120V820M300 120V820M420 120V820M540 120V820M660 120V820M780 120V820M900 120V820M1020 120V820"/>
  </g>

  <!-- emblem -->
  <g transform="translate(0,10)" filter="url(#softGlow)">
    <!-- circular incomplete orbit -->
    <path d="M310 465A290 290 0 1 1 880 555" fill="none" stroke="url(#blueGrad)" stroke-width="28" stroke-linecap="round"/>
    <path d="M315 470A290 290 0 0 0 700 725" fill="none" stroke="url(#blueGrad)" stroke-width="28" stroke-linecap="round"/>

    <!-- orbit nodes -->
    <circle cx="835" cy="250" r="30" fill="#08213e" stroke="url(#blueGrad)" stroke-width="18"/>
    <circle cx="314" cy="562" r="30" fill="#08213e" stroke="url(#blueGrad)" stroke-width="18"/>
    <circle cx="903" cy="470" r="24" fill="#1399f4"/>
    <circle cx="860" cy="620" r="20" fill="#08213e" stroke="url(#blueGrad)" stroke-width="14"/>

    <!-- people group -->
    <g>
      <!-- center person -->
      <circle cx="600" cy="395" r="55" fill="url(#blueGrad)"/>
      <path d="M510 575c0-75 42-118 90-118s90 43 90 118v88H510z" fill="url(#blueGrad)"/>
      <!-- side left -->
      <circle cx="470" cy="420" r="42" fill="url(#personGrad)" opacity="0.82"/>
      <path d="M408 585c0-58 30-92 65-92s65 34 65 92v95c-53-20-93-52-130-95z" fill="url(#personGrad)" opacity="0.78"/>
      <!-- side right -->
      <circle cx="730" cy="420" r="42" fill="url(#personGrad)" opacity="0.82"/>
      <path d="M662 585c0-58 30-92 65-92s65 34 65 92v95c-51-20-91-52-130-95z" fill="url(#personGrad)" opacity="0.78"/>
    </g>

    <!-- circuit upward lines -->
    <g fill="none" stroke="url(#blueGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <path d="M580 690H760L840 610H875"/>
      <path d="M520 735H765L910 590V500"/>
      <path d="M640 760H815L930 645H965"/>
      <path d="M700 805H835L960 680V650"/>
    </g>
  </g>

  <!-- brand text -->
  <g filter="url(#textShadow)">
    <text x="600" y="890" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-2" fill="#ffffff">
      Implanter <tspan fill="#27b7ff">OS</tspan>
    </text>
    <line x1="390" y1="925" x2="810" y2="925" stroke="url(#blueGrad)" stroke-width="5" opacity="0.75"/>
    <text x="600" y="1008" direction="rtl" unicode-bidi="bidi-override" text-anchor="middle" font-family="Arial, 'Noto Sans Hebrew', sans-serif" font-size="44" font-weight="700" letter-spacing="2" fill="#22aaf7">
      מערכת ניתוח פגישות הטמעה
    </text>
    <text x="600" y="1070" direction="rtl" unicode-bidi="bidi-override" text-anchor="middle" font-family="Arial, 'Noto Sans Hebrew', sans-serif" font-size="28" font-weight="500" letter-spacing="5" fill="#87b9e8" opacity="0.95">
      משאבי אנוש | הטמעה | ניתוח | תובנות
    </text>
  </g>
</svg>
